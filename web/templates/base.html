<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TCGPlayer Pricing{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>TCGPlayer Pricing</strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if request.path == '/' %}aria-current="page"{% endif %}>Dashboard</a></li>
            <li><a href="/predictions" {% if request.path == '/predictions' %}aria-current="page"{% endif %}>Predictions</a></li>
            <li><a href="/watchlist" {% if request.path == '/watchlist' %}aria-current="page"{% endif %}>Watchlist</a></li>
            <li><a href="/analysis" {% if request.path == '/analysis' %}aria-current="page"{% endif %}>Analysis</a></li>
            <li><a href="/backtest" {% if request.path == '/backtest' %}aria-current="page"{% endif %}>Backtest</a></li>
            <li><a href="/jobs" {% if request.path == '/jobs' %}aria-current="page"{% endif %}>Jobs</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
